markup=pango

[rofi]
command= echo "<span foreground='#98C379' background='#1A1A1A' size='x-large'>  </span><span background='#98C379'> <span foreground='#1A1A1A' rise='1.5pt' size='large'>  󱓞 </span> <span size='small' rise='2pt'>$(~/.config/rofi/launchers/type-2/launcher.sh)</span>  </span><span background='#98C379' foreground='#1A1A1A' size='x-large'> </span>"
interval=once

[mpd]
command=~/.config/i3/script/mpc
[mpd]
command=echo "<span background='#1A1A1A' size='large'>󰝚 </span><span size='small' rise='2pt'>$(mpc current -f %file% | awk -F/ '{gsub(/\..*$/, "", $NF); print $NF}')</span>"
interval=1

[volume]
command=pavucontrol
[volume]
command= echo "<span foreground='#61AFEF' background='#1A1A1A' size='x-large'> </span><span background='#61AFEF'> <span foreground='#1A1A1A' size='large' rise='1pt'>  </span><span size='small' rise='2pt'> $(amixer get Master | grep -oP '\d{1,3}%' | awk 'NR==1')</span>  </span><span background='#61AFEF' foreground='#1A1A1A' size='x-large'> </span>"
interval=1
color=#1A1A1A

[uptime]
command=echo "<span background='#1A1A1A' size='large'> </span><span size='small' rise='2pt'>$(echo "$(uptime -p | sed 's/up //; s/\ days\?,/d/; s/\ hours\?,/h/; s/\ minutes\?/m/; s/\ seconds\?//')")</span>"
interval=1
interval=60

[weather]
command= echo "<span foreground='#61AFEF' background='#1A1A1A' size='x-large'> </span><span background='#61AFEF'> <span foreground='#1A1A1A' size='large' rise='1pt'>  </span>  <span size='small' rise='3pt'>$(curl -s "https://wttr.in/Jakarta?format=%C\n%t\n" | sed 'N;s/\n/ /')</span>  </span><span background='#61AFEF' foreground='#1A1A1A' size='x-large'> </span>"
interval=60
color=#1A1A1A

[cpu]
command=echo "<span size='x-large'> </span><span size='small' rise='2pt'> $(top -bn1 | grep '%Cpu' | awk '{printf "%.f%%\n", $2 + $4}')</span>"
interval=1

[memory]
command=echo "<span foreground='#61AFEF' background='#1A1A1A' size='x-large'> </span><span background='#61AFEF'> <span foreground='#1A1A1A' size='large' rise='1pt'>  </span> <span size='small' rise='3pt'>$(free -h | awk '/Mem:/ {gsub(/[A-Za-z]/, "", $2); gsub(/[A-Za-z]/, "", $3); printf "%s/%s GB\n", $3, $2}')</span>  </span><span background='#61AFEF' foreground='#1A1A1A' size='x-large'> </span>"
interval=1
color=#1A1A1A

[wifi]
command=echo "<span size='large'> </span><span size='small' rise='2pt'> $(iwgetid -r)</span>"
interval=1

[date]
command=echo "<span foreground='#61AFEF' background='#1A1A1A' size='x-large'> </span><span background='#61AFEF'> <span foreground='#1A1A1A' size='large' rise='1pt'>  </span> <span size='small' rise='3pt'>$(date '+%a %d %b')</span>  </span><span background='#61AFEF' foreground='#1A1A1A' size='x-large'> </span>"
interval=1
color=#1A1A1A

[battery]
command=~/.config/i3/script/battery
interval=60

[time]
command=echo "<span foreground='#61AFEF' background='#1A1A1A' size='x-large'> </span><span background='#61AFEF'> <span foreground='#1A1A1A' size='large' rise='1pt'>  </span><span size='small' rise='3pt'>$(date '+%H:%M') </span>  </span><span background='#61AFEF' foreground='#1A1A1A' size='x-large'> </span>"
interval=60
color=#1A1A1A

[archupdate]
command=~/.config/i3/script/aptupdate
interval=60

[powermenu]
command= echo "<span foreground='#E06C75' background='#1A1A1A' size='x-large'> </span><span background='#E06C75'> <span foreground='#1A1A1A' rise='2pt' size='large'>  </span> <span size='small' rise='2pt'>$(~/.config/rofi/powermenu/type-2/powermenu.sh)</span> </span>"
interval=once
