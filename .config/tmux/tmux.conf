set -g history-limit 10000
set -g mouse on
set -g base-index 1
set -sg escape-time 0
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g automatic-rename on

#  ██  ██  
# ████████ 
#  ██  ██  
# ████████ 
#  ██  ██  
# Keybind
# bind = prefix/ctrl+a + {key}
# bind -n = without using prefix/ctrl+a
# M- = alt
# C- = ctrl
# S- = shift
prfx=C-a
alt=M
ctrl=C
shift=S

# changing prefix/ctrl+b to prefix/ctrl+a who would want to type "b" that's far from ctrl key eh?
unbind C-b
set -g prefix $prfx
bind $prfx send-prefix

# (r)eload config
bind r source-file ~/.config/tmux/tmux.conf\; display "Tmux config has been reloaded!"

# Switch between split pane
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Switch window index with alt+number
bind -n $alt-1 select-window -t 1
bind -n $alt-2 select-window -t 2
bind -n $alt-3 select-window -t 3
bind -n $alt-4 select-window -t 4
bind -n $alt-5 select-window -t 5
bind -n $alt-6 select-window -t 6
bind -n $alt-7 select-window -t 7
bind -n $alt-8 select-window -t 8
bind -n $alt-9 select-window -t 9
bind -n $alt-c new-window

# Spawn split pane vertical and horizontal
bind -n $alt-v split-window -v
bind -n $alt-h split-window -h

# Resize pane
bind -n $ctrl-$shift-Left resize-pane -L 5
bind -n $ctrl-$shift-Right resize-pane -R 5
bind -n $ctrl-$shift-Up resize-pane -U 5
bind -n $ctrl-$shift-Down resize-pane -D 5

# Move windows index to left or right 
bind -n $alt-$shift-Left swap-window -t -1
bind -n $alt-$shift-Right swap-window -t +1

#  ██  ██  
# ████████ 
#  ██  ██  
# ████████ 
#  ██  ██  
# Tmux statusbar
status_bg=#1E1E1E
status_fg=#ffffff
window_bg=#03395E
WG_bg=#007ACC
prfx_bg=#C67724

# Tmux statusbar color
set -g status-position top
set -g status-style bg=$status_bg,fg=$status_fg

# status-left
IC_session=" #(echo 󱂬)"
WG_session=" #{session_name}"
WG_separator=" #(echo |)"
set -g status-left "#[bg=$WG_bg]${IC_session} #[bg=$status_bg]${WG_session} #[bg=$status_bg]${WG_separator}"

# status-right
IC_time=" #(echo 󰥔)"
IC_date=" #(echo )"
WG_prfx="#{?client_prefix,   ,}"
WG_time="%H:%M"
WG_date="%b-%d-%Y"
WG_position="#{?pane_at_top, , } "
set -g status-right "#[bg=$prfx_bg]${WG_prfx}#[bg=$status_bg] #[bg=$WG_bg]${IC_time} #[bg=$status_bg] ${WG_time} #[bg=$WG_bg]${IC_date} #[bg=$status_bg] ${WG_date} #[bg=$WG_bg]${WG_position}"

# window-index
set -g window-status-format "#{window_index}#(echo :)#{window_name} "
set -g window-status-current-style bg=$window_bg,fg=$status_fg

# Statusbar settings
set -g status-interval 60
set -g status-left-length 50
set -g status-right-length 50
set -g pane-active-border-style bg=default,fg=$status_bg
set -g pane-border-style fg=$status_bg
